<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Agent Dashboard — Cover Credit</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:#0D1F3C; --navy2:#152845; --navy3:#1E3558;
  --gold:#C98A1A;  --gold2:#E5A020; --gold3:#F5C050;
  --slate:#7A9BBF; --muted:#4A6585;
  --white:#F0F4FA; --dim:#A8BCCF;
  --green:#1A9E6A; --red:#C43030; --amber:#D4870A;
  --border:rgba(120,160,200,.15);
  --card:rgba(21,40,69,.7);
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column}

/* ── LOGIN SCREEN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-card{background:var(--navy2);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:400px}
.login-logo{font-size:22px;font-weight:600;color:var(--gold);letter-spacing:-.5px;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--slate);margin-bottom:28px}
.login-card label{display:block;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.login-card input{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--white);font-size:14px;font-family:inherit;outline:none;margin-bottom:16px;transition:border-color .2s}
.login-card input:focus{border-color:var(--gold)}
.btn-gold{width:100%;padding:12px;background:var(--gold);color:#0D1F3C;font-weight:600;font-size:15px;border:none;border-radius:8px;cursor:pointer;font-family:inherit;transition:background .2s}
.btn-gold:hover{background:var(--gold2)}
.login-err{font-size:13px;color:var(--red);margin-top:10px;display:none}

/* ── TOP BAR ── */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--navy2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.topbar-left{display:flex;align-items:center;gap:16px}
.topbar-brand{font-size:16px;font-weight:600;color:var(--gold)}
.agent-pill{background:var(--navy3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:12px;color:var(--dim)}
.agent-pill span{color:var(--gold3);font-family:'DM Mono',monospace;font-weight:500}
.topbar-nav{display:flex;gap:4px}
.tnav{background:none;border:none;color:var(--dim);font-family:inherit;font-size:13px;padding:6px 14px;border-radius:6px;cursor:pointer;transition:all .15s}
.tnav.active,.tnav:hover{background:var(--navy3);color:var(--white)}
.tnav.active{color:var(--gold)}
.topbar-right{display:flex;align-items:center;gap:10px}
.btn-sm{padding:7px 14px;border-radius:7px;font-size:13px;font-family:inherit;cursor:pointer;transition:all .15s}
.btn-add{background:var(--gold);color:#0D1F3C;border:none;font-weight:600}
.btn-add:hover{background:var(--gold2)}
.btn-out{background:none;border:1px solid var(--border);color:var(--dim)}
.btn-out:hover{color:var(--white);border-color:var(--slate)}

/* ── CONTENT ── */
.content{flex:1;padding:24px;max-width:1200px;width:100%;margin:0 auto}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block}

/* ── STAT CARDS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.stat-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:500;line-height:1}
.stat-sub{font-size:12px;color:var(--slate);margin-top:4px}

/* ── CHARTS ROW ── */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.chart-title{font-size:13px;font-weight:500;color:var(--dim);margin-bottom:14px}
.bar-chart{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.bar-label{width:90px;color:var(--dim);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-wrap{flex:1;background:var(--navy3);border-radius:3px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--gold);transition:width .5s}
.bar-count{width:32px;color:var(--white);font-size:12px}

/* ── LEAD LIST ── */
.leads-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.leads-title{font-size:16px;font-weight:500}
.leads-filters{display:flex;gap:8px;flex-wrap:wrap}
.filter-select{background:var(--navy2);border:1px solid var(--border);color:var(--white);font-family:inherit;font-size:13px;padding:7px 12px;border-radius:7px;outline:none;cursor:pointer}
.search-box{background:var(--navy2);border:1px solid var(--border);color:var(--white);font-family:inherit;font-size:13px;padding:7px 12px;border-radius:7px;outline:none;width:180px}
.search-box:focus,.filter-select:focus{border-color:var(--gold)}
.leads-table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.leads-table{width:100%;border-collapse:collapse;font-size:13px}
.leads-table th{padding:11px 14px;text-align:left;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);white-space:nowrap}
.leads-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top}
.leads-table tr:last-child td{border-bottom:none}
.leads-table tr:hover td{background:rgba(255,255,255,.02)}
.lead-name{font-weight:500;color:var(--white)}
.lead-phone{color:var(--slate);font-family:'DM Mono',monospace;font-size:12px;margin-top:2px}
.dept-badge{display:inline-block;font-size:11px;padding:3px 8px;border-radius:4px;background:var(--navy3);color:var(--gold3)}
.status-pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.s-new{background:rgba(201,138,26,.15);color:var(--gold3)}
.s-contacted{background:rgba(26,158,106,.12);color:#4ECFA0}
.s-converted{background:rgba(26,158,106,.2);color:#2DDB8F}
.s-notInterested,.s-lost{background:rgba(196,48,48,.12);color:#E07070}
.s-followUp,.s-callbackScheduled{background:rgba(26,108,200,.15);color:var(--slate)}
.s-default{background:var(--navy3);color:var(--dim)}
.lead-date{color:var(--dim);font-size:12px;white-space:nowrap}
.btn-icon{background:none;border:1px solid var(--border);color:var(--dim);padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-icon:hover{color:var(--white);border-color:var(--slate)}
.wa-btn{background:rgba(37,211,102,.12);border:1px solid rgba(37,211,102,.3);color:#25D366}
.wa-btn:hover{background:rgba(37,211,102,.2)}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted)}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:14px;width:100%;max-width:520px;padding:28px}
.modal-title{font-size:17px;font-weight:500;margin-bottom:20px;color:var(--white)}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.form-row input,.form-row select,.form-row textarea{width:100%;background:var(--navy3);border:1px solid var(--border);color:var(--white);font-family:inherit;font-size:14px;padding:10px 13px;border-radius:8px;outline:none;transition:border-color .2s}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--gold)}
.form-row textarea{resize:vertical;min-height:80px}
.form-row select option{background:var(--navy2)}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{background:none;border:1px solid var(--border);color:var(--dim);padding:9px 18px;border-radius:7px;font-family:inherit;font-size:14px;cursor:pointer}
.btn-submit{background:var(--gold);color:#0D1F3C;border:none;padding:9px 20px;border-radius:7px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.btn-cancel:hover{color:var(--white)} .btn-submit:hover{background:var(--gold2)}

/* ── NOTE LOG ── */
.note-log{max-height:180px;overflow-y:auto;margin-bottom:14px}
.note-item{background:var(--navy3);border-radius:7px;padding:10px 12px;margin-bottom:8px;font-size:13px}
.note-meta{font-size:11px;color:var(--dim);margin-top:4px}

/* ── TREND MINI ── */
.trend-bars{display:flex;align-items:flex-end;gap:3px;height:48px;margin-top:8px}
.tb{flex:1;background:rgba(201,138,26,.4);border-radius:2px 2px 0 0;min-width:4px;transition:height .4s}

/* ── RESP ── */
@media(max-width:640px){
  .charts-row{grid-template-columns:1fr}
  .form-2col{grid-template-columns:1fr}
  .topbar-nav{display:none}
}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">Cover Credit</div>
    <div class="login-sub">Agent Portal — sign in to your dashboard</div>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="username"/>
    <label>Password</label>
    <input type="password" id="loginPw" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    <button class="btn-gold" onclick="doLogin()">Sign in</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ══════════ APP ══════════ -->
<div id="app">
  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-brand">Cover Credit</div>
      <div class="agent-pill" id="agentPill">Agent · <span id="agentCode">–</span></div>
    </div>
    <div class="topbar-nav">
      <button class="tnav active" onclick="showView('dashboard')">Dashboard</button>
      <button class="tnav" onclick="showView('leads')">My Leads</button>

    </div>
    <div class="topbar-right">
      <button class="btn-sm btn-add" onclick="openAddLead()">+ Add Lead</button>
      <button class="btn-sm btn-out" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="content">

    <!-- ── DASHBOARD VIEW ── -->
    <div class="view active" id="view-dashboard">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="charts-row">
        <div class="chart-card">
          <div class="chart-title">Leads by department</div>
          <div class="bar-chart" id="deptChart"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Leads by status</div>
          <div class="bar-chart" id="statusChart"></div>
        </div>
      </div>
      <div class="chart-card" style="margin-bottom:24px">
        <div class="chart-title">Last 14 days activity</div>
        <div class="trend-bars" id="trendBars"></div>
      </div>
      <div class="leads-title" style="margin-bottom:12px">Recent leads</div>
      <div class="leads-table-wrap">
        <table class="leads-table">
          <thead><tr>
            <th>Client</th><th>Department</th><th>Status</th><th>Source</th><th>Date</th><th>Actions</th>
          </tr></thead>
          <tbody id="recentTbody"></tbody>
        </table>
      </div>
    </div>

    <!-- ── LEADS VIEW ── -->
    <div class="view" id="view-leads">
      <div class="leads-header">

            <option value="new">New</option>
            <option value="contacted">Contacted</option>
            <option value="qualified">Qualified</option>
            <option value="proposal">Proposal sent</option>
            <option value="converted">Converted</option>
            <option value="followUp">Follow up</option>
            <option value="notInterested">Not interested</option>
          </select>
          <select class="filter-select" id="filterDept" onchange="loadLeads()">
            <option value="">All departments</option>
            <option value="health">Health</option>
            <option value="life">Life</option>
            <option value="bike">Bike</option>
            <option value="car">Car</option>
            <option value="loans">Loans</option>
          </select>
        </div>
      </div>
      <div class="leads-table-wrap">
        <table class="leads-table">
          <thead><tr>
            <th>Client</th><th>Dept</th><th>Status</th><th>Source</th><th>Notes</th><th>Date</th><th>Actions</th>
          </tr></thead>
          <tbody id="leadsTbody"></tbody>
        </table>
      </div>
      <div style="text-align:center;margin-top:14px;font-size:13px;color:var(--dim)" id="pagination"></div>
    </div>

    <!-- ── PROFILE VIEW ── -->
    <div class="view" id="view-profile">
      <div style="max-width:420px">

        <div class="chart-card">

          <button class="btn-gold" style="width:auto;padding:10px 24px;font-size:14px" onclick="changePw()">Update password</button>
          <div id="pwMsg" style="font-size:13px;margin-top:8px;display:none"></div>

  </div><!-- /content -->
</div><!-- /app -->

<!-- ══════════ ADD LEAD MODAL ══════════ -->

  <div class="modal">

    <div class="form-2col">

<!-- ══════════ EDIT LEAD MODAL ══════════ -->
<div class="modal-bg" id="editModal">

<script>
// ════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════
const API = 'https://api.covercredit.in/api';
let TOKEN = '', PAGE = 1, SEARCH_TIMER;

// ════════════════════════════════════════
// AUTH
// ════════════════════════════════════════

// FIX 1: d.error → d.message; use d.success instead of r.ok
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginErr');
  errEl.style.display = 'none';

  try {
    const r = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pw }),
    });
    const d = await r.json();

    // FIX: was `if (!r.ok)` → use d.success which all API responses set consistently
    if (!d.success) {
      // FIX: was d.error → API sends d.message
      errEl.textContent  = d.message || 'Login failed. Please try again.';
      errEl.style.display = 'block';
      return;
    }

    TOKEN = d.token;
    localStorage.setItem('cc_agent_token', TOKEN);

    if (d.role === 'owner' || d.role === 'admin') {
      window.location.href = '/admin';
      return;
    }

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display         = 'flex';
    // d.agentCode and d.name come directly from the login response
    document.getElementById('agentCode').textContent     = d.agentCode || d.name || 'Agent';

    if (d.mustResetPw) {
      showView('profile');
      alert('Please change your password on first login.');
    } else {
      loadDashboard();
    }
  } catch (err) {
    console.error('Login error:', err);
    errEl.textContent  = 'Connection error. Try again.';
    errEl.style.display = 'block';
  }
}

function logout() {
  localStorage.removeItem('cc_agent_token');
  document.getElementById('app').style.display        = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  TOKEN = '';
}

// Centralised fetch helper — all API calls go through here
async function api(path, opts = {}) {
  try {
    const r = await fetch(API + path, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${TOKEN}`,
        ...(opts.headers || {}),
      },
    });
    if (r.status === 401) { logout(); return null; }
    return r.json();
  } catch (err) {
    console.error('API error on', path, err);
    return null;
  }
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function showView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tnav').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  const idx = ['dashboard', 'leads', 'profile'].indexOf(v);
  if (idx >= 0) document.querySelectorAll('.tnav')[idx]?.classList.add('active');
  if (v === 'dashboard') loadDashboard();
  if (v === 'leads')     loadLeads();
  if (v === 'profile')   loadProfile();
}

// ════════════════════════════════════════
// DASHBOARD
// ════════════════════════════════════════
async function loadDashboard() {
  const d = await api('/agent/dashboard');
  if (!d || !d.success) return;

  // d.stats, d.recentLeads, d.charts all come directly on d — no wrapping
  const s = d.stats;
  const convColor = s.conversionRate >= 20 ? '#2DDB8F' : s.conversionRate >= 10 ? '#E5A020' : '#E07070';

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Total leads</div>
      <div class="stat-value">${s.totalLeads}</div>
      <div class="stat-sub">${s.leadsThisMonth} this month</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-value" style="color:var(--gold)">${s.leadsToday}</div>
      <div class="stat-sub">${s.leadsThisWeek} this week</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">New (uncontacted)</div>
      <div class="stat-value" style="color:var(--amber)">${s.newLeads}</div>
      <div class="stat-sub">Action needed</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Converted</div>
      <div class="stat-value" style="color:${convColor}">${s.converted}</div>
      <div class="stat-sub">${s.conversionRate}% conversion rate</div>
    </div>
  `;

  // Dashboard charts keys match API: byDepartment, byStatus, dailyTrend
  renderBarChart('deptChart',   d.charts.byDepartment, '_id', 'count');
  renderBarChart('statusChart', d.charts.byStatus,     '_id', 'count');
  renderTrend(d.charts.dailyTrend);
  renderRecentLeads(d.recentLeads);
}

function renderBarChart(elId, data, keyField, valField) {
  if (!data || !data.length) {
    document.getElementById(elId).innerHTML =
      '<div style="color:var(--muted);font-size:13px">No data yet</div>';
    return;
  }
  const max = Math.max(...data.map(d => d[valField]), 1);
  document.getElementById(elId).innerHTML = data.slice(0, 6).map(d =>
    `<div class="bar-row">
      <div class="bar-label">${d[keyField] || 'Unknown'}</div>
      <div class="bar-wrap"><div class="bar-fill" style="width:${Math.round(d[valField]/max*100)}%"></div></div>
      <div class="bar-count">${d[valField]}</div>
    </div>`
  ).join('');
}

function renderTrend(data) {
  if (!data || !data.length) {
    document.getElementById('trendBars').innerHTML =
      '<div style="color:var(--muted);font-size:12px">No data yet</div>';
    return;
  }
  const max = Math.max(...data.map(d => d.count), 1);
  const map = {};
  data.forEach(d => map[d._id] = d.count);
  const bars = [];
  for (let i = 13; i >= 0; i--) {
    const dt  = new Date(Date.now() - i * 86400000);
    const key = dt.toISOString().slice(0, 10);
    bars.push(map[key] || 0);
  }
  document.getElementById('trendBars').innerHTML = bars.map(v =>
    `<div class="tb" style="height:${Math.max(4, Math.round(v/max*100))}%" title="${v} leads"></div>`
  ).join('');
}

function renderRecentLeads(leads) {
  const tbody = document.getElementById('recentTbody');
  if (!leads || !leads.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-state">No leads yet — add your first one!</td></tr>`;
    return;
  }
  tbody.innerHTML = leads.map(l => `
    <tr>
      <td><div class="lead-name">${esc(l.name)}</div><div class="lead-phone">${l.phone}</div></td>
      <td><span class="dept-badge">${l.department || '–'}</span></td>
      <td>${statusPill(l.status)}</td>
      <td style="color:var(--dim);font-size:12px">${l.leadSource || 'website'}</td>
      <td class="lead-date">${fmtDate(l.createdAt)}</td>
      <td style="display:flex;gap:6px">
        <button class="btn-icon" onclick="openEdit('${l._id}')">Edit</button>
        ${l.phone ? `<button class="btn-icon wa-btn" onclick="waLink('${l.phone}','${esc(l.name)}')">WA</button>` : ''}
      </td>
    </tr>
  `).join('');
}

// ════════════════════════════════════════
// LEADS PAGE
// ════════════════════════════════════════

// FIX 4: d.leads → d.data; d.total/page/pages → d.pagination.*
async function loadLeads() {
  PAGE = 1;
  const q      = document.getElementById('searchBox')?.value || '';
  const status = document.getElementById('filterStatus')?.value || '';
  const dept   = document.getElementById('filterDept')?.value || '';

  const params = new URLSearchParams({ page: PAGE, limit: 20 });
  if (q)      params.set('q', q);
  if (status) params.set('status', status);
  if (dept)   params.set('dept', dept);

  const d = await api('/agent/leads?' + params);
  if (!d || !d.success) return;

  const tbody = document.getElementById('leadsTbody');

  // FIX: was d.leads → API returns d.data
  const leads = d.data || [];
  if (!leads.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty-state">No leads found</td></tr>`;
    document.getElementById('pagination').textContent = '';
    return;
  }

  tbody.innerHTML = leads.map(l => `
    <tr>
      <td><div class="lead-name">${esc(l.name)}</div><div class="lead-phone">${l.phone}</div></td>
      <td><span class="dept-badge">${l.department || '–'}</span></td>
      <td>${statusPill(l.status)}</td>
      <td style="color:var(--dim);font-size:12px">${l.leadSource || 'website'}</td>
      <td style="color:var(--dim);font-size:12px;max-width:160px">${l.adminNotes || '–'}</td>
      <td class="lead-date">${fmtDate(l.createdAt)}</td>
      <td style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn-icon" onclick="openEdit('${l._id}')">Edit</button>
        ${l.phone ? `<button class="btn-icon wa-btn" onclick="waLink('${l.phone}','${esc(l.name)}')">WA</button>` : ''}
      </td>
    </tr>
  `).join('');

  // FIX: was d.total/d.page/d.pages → API returns d.pagination.total/page/pages
  const p = d.pagination || {};
  document.getElementById('pagination').textContent =
    `Showing ${leads.length} of ${p.total || 0} leads · Page ${p.page || 1} of ${p.pages || 1}`;
}

function debounceSearch() {
  clearTimeout(SEARCH_TIMER);
  SEARCH_TIMER = setTimeout(loadLeads, 350);
}

// ════════════════════════════════════════
// ADD LEAD
// ════════════════════════════════════════
function openAddLead()  { document.getElementById('addLeadModal').classList.add('open'); }
function closeAddLead() { document.getElementById('addLeadModal').classList.remove('open'); }

// FIX 7: r?.error → r?.message
async function submitLead() {
  const name  = document.getElementById('lName').value.trim();
  const phone = document.getElementById('lPhone').value.trim();
  const dept  = document.getElementById('lDept').value;
  const errEl = document.getElementById('addLeadErr');
  errEl.style.display = 'none';

  if (!name)  { errEl.textContent = 'Name is required';             errEl.style.display = 'block'; return; }
  if (!phone) { errEl.textContent = 'Phone is required';            errEl.style.display = 'block'; return; }
  if (!dept)  { errEl.textContent = 'Please select a department';   errEl.style.display = 'block'; return; }

  const r = await api('/agent/leads', {
    method: 'POST',
    body: JSON.stringify({
      name, phone,
      city:       document.getElementById('lCity').value,
      email:      document.getElementById('lEmail').value,
      department: dept,
      leadSource: document.getElementById('lSource').value,
      notes:      document.getElementById('lNotes').value,
    }),
  });

  if (!r?.success) {
    // FIX: was r?.error → API returns r?.message
    errEl.textContent  = r?.message || 'Failed to save lead. Please try again.';
    errEl.style.display = 'block';
    return;
  }

  closeAddLead();
  ['lName', 'lPhone', 'lCity', 'lEmail', 'lNotes'].forEach(id =>
    document.getElementById(id).value = ''
  );
  document.getElementById('lDept').selectedIndex = 0;
  loadDashboard();
  if (document.getElementById('view-leads').classList.contains('active')) loadLeads();
}

// ════════════════════════════════════════
// EDIT LEAD
// ════════════════════════════════════════

// FIX 5: API returns { success, data: booking } — must use d.data.*
async function openEdit(id) {
  const d = await api('/agent/leads/' + id);
  if (!d || !d.success) return;

  // FIX: was d.name, d.phone etc → API wraps in d.data
  const lead = d.data;

  document.getElementById('editId').value            = id;
  document.getElementById('editModalTitle').textContent =
    esc(lead.name) + ' — ' + (lead.department || 'lead');
  document.getElementById('editClientInfo').innerHTML =
    `<strong>${esc(lead.name)}</strong> &nbsp;·&nbsp; ${lead.phone} &nbsp;·&nbsp; ${esc(lead.city || '')}` +
    `<br/><span style="color:var(--dim);font-size:12px">` +
    `${lead.department || ''} · ${lead.leadSource || 'website'} · ${fmtDate(lead.createdAt)}</span>`;

  document.getElementById('editStatus').value  = lead.status        || 'new';
  document.getElementById('editContact').value = lead.contactMethod || 'call';
  document.getElementById('editNote').value    = '';

  // noteLog field names match API (note, addedByName, addedAt) — no change needed
  const log = lead.noteLog || [];
  document.getElementById('noteLog').innerHTML = log.length
    ? log.slice().reverse().map(n =>
        `<div class="note-item">${esc(n.note)}<div class="note-meta">${esc(n.addedByName || 'You')} · ${fmtDate(n.addedAt)}</div></div>`
      ).join('')
    : '<div style="color:var(--dim);font-size:12px">No notes yet</div>';

  document.getElementById('editModal').classList.add('open');
}

function closeEdit() { document.getElementById('editModal').classList.remove('open'); }

async function saveEdit() {
  const id = document.getElementById('editId').value;
  const r = await api('/agent/leads/' + id, {
    method: 'PATCH',
    body: JSON.stringify({
      status:        document.getElementById('editStatus').value,
      contactMethod: document.getElementById('editContact').value,
      note:          document.getElementById('editNote').value.trim(),
    }),
  });
  if (r?.success) {
    closeEdit();
    loadDashboard();
    if (document.getElementById('view-leads').classList.contains('active')) loadLeads();
  }
}

// PROFILE

// FIX 8: API returns { success, data: user } — must use d.data.*
async function loadProfile() {
  const d = await api('/agent/profile');
  if (!d || !d.success) return;

  // FIX: was d.name, d.phone, d.city → API wraps in d.data
  const u = d.data;
  document.getElementById('pName').value  = u.name  || '';
  document.getElementById('pPhone').value = u.phone || '';
  document.getElementById('pCity').value  = u.city  || '';
}

async function saveProfile() {
  const r = await api('/agent/profile', {
    method: 'PATCH',
    body: JSON.stringify({
      name:  document.getElementById('pName').value,
      phone: document.getElementById('pPhone').value,
      city:  document.getElementById('pCity').value,
    }),
  });
  alert(r?.success ? 'Profile updated ✓' : (r?.message || 'Failed to update'));
}

async function changePw() {
  const el = document.getElementById('pwMsg');
  const r = await api('/auth/agent/change-password', {
    method: 'POST',
    body: JSON.stringify({
      currentPassword: document.getElementById('cpCurrent').value,
      newPassword:     document.getElementById('cpNew').value,
    }),
  });
  el.style.display = 'block';
  el.style.color   = r?.success ? '#2DDB8F' : 'var(--red)';
  // API returns r.message on both success and failure
  el.textContent   = r?.message || 'Error';
  if (r?.success) {
    document.getElementById('cpCurrent').value = '';
    document.getElementById('cpNew').value     = '';
  }
}

// ════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════
function fmtDate(d) {
  if (!d) return '–';
  return new Date(d).toLocaleDateString('en-IN', {
    day: 'numeric', month: 'short', year: 'numeric',
  });
}

function statusPill(s) {
  const map = {
    new:               's-new',
    contacted:         's-contacted',
    converted:         's-converted',
    notInterested:     's-notInterested',
    lost:              's-notInterested',
    followUp:          's-followUp',
    callbackScheduled: 's-followUp',
  };
  return `<span class="status-pill ${map[s] || 's-default'}">${s || 'new'}</span>`;
}

function waLink(phone, name) {
  const clean = phone.replace(/\D/g, '');
  const num   = clean.startsWith('91') ? clean : '91' + clean;
  window.open(
    `https://wa.me/${num}?text=Hi ${encodeURIComponent(name)}, I'm from Cover Credit. Is this a good time to talk?`,
    '_blank'
  );
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════════════════
// AUTO-LOGIN on page load
// FIX 9: /auth/me response may wrap user in d.data
// ════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('cc_agent_token');
  if (!saved) return;

  TOKEN = saved;
  api('/auth/me').then(d => {
    if (!d || !d.success) {
      // Token invalid or expired — stay on login screen
      TOKEN = '';
      localStorage.removeItem('cc_agent_token');
      return;
    }
    // Handle both flat (d.agentCode) and wrapped (d.data.agentCode) response shapes
    const user = d.data || d;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display         = 'flex';
    document.getElementById('agentCode').textContent     = user.agentCode || user.name || 'Agent';
    loadDashboard();
  });
});
</script>
